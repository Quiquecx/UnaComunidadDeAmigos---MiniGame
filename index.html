<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Aventura de la Comunidad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="pantalla-inicio">
        <img src="src/imgs/introduccion/Titulo_Escolar_Renovado-Primaria-Libro_02.png" 
             class="logo-titulo" alt="La Aventura de la Comunidad">
        
        <img src="src/imgs/introduccion/L5-Portadilla2_comunidad.png" 
             class="img-comunidad" alt="Comunidad de Amigos">

        <div class="contenedor-botones">
            <button id="btn-jugar" class="btn-menu">¡A jugar!</button>
            <button id="btn-instrucciones" class="btn-menu">¿Cómo jugar?</button>
        </div>
    </main>

    <section id="escenario-juego" class="hidden">
        <div id="contenedor-mision">
            <div id="marcador">Pistas: <span id="contador">0</span>/10</div>
            <img src="src/imgs/zona01/Juego_de_busqueda.jpg" id="fondo-busqueda" alt="Salón de clases">
            <div id="capa-iconos"></div>
        </div>
    </section>

    <section id="escenario-zona2" class="hidden">
        <div id="contenedor-pistas">
            <canvas id="canvasPistas"></canvas>
            <div id="instrucciones-pistas">
                Busca las 7 pistas en el mapa y resuelve los retos
            </div>
        </div>
    </section>

    <section id="escenario-zona3" class="hidden">
        <div id="contenedor-runner">
            <canvas id="canvasRunner"></canvas>
            
            <div id="marcador-corazones">
                ❤️ Corazones: <span id="corazones-val">0</span>
            </div>

            <div id="instrucciones-runner">
                Presiona ESPACIO o TOCA para SALTAR
            </div>
        </div>
    </section>

    <div id="modal-mensaje" class="modal hidden">
        <div class="modal-contenido">
            <h2 id="modal-titulo"></h2>
            <div id="modal-cuerpo">
                <p id="modal-texto"></p>
                <div id="contenedor-opciones"></div> 
            </div>
            <button id="btn-cerrar-modal">Continuar</button>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
